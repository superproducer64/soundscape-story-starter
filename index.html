<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScape Story Starter</title>
    <style>
        body {
            background: linear-gradient(to right, #2c3e50, #3498db);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #controls {
            margin: 10px;
        }
        button {
            background-color: #e74c3c;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover {
            background-color: #c0392b;
        }
        #recordingsList {
            margin-top: 20px;
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>SoundScape Story Starter</h1>
    <div id="controls">
        <div>
            <select id="soundType">
                <option value="ambient">Ambient Sound</option>
                <option value="music">Music</option>
                <option value="effects">Sound Effects</option>
            </select>
            <input type="text" id="notes" placeholder="Notes..." />
        </div>
        <br />
        <button id="startButton">Start Recording</button>
        <button id="stopButton" disabled>Stop Recording</button>
        <div id="timer">00:00</div>
    </div>
    <div id="recordingsList"></div>
    <button id="generateTemplate">Generate Story Template</button>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let recordingTime;
        let timerInterval;

        document.getElementById('startButton').addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };
            mediaRecorder.start();
            recordingTime = 0;
            document.getElementById('stopButton').disabled = false;
            document.getElementById('startButton').disabled = true;
            startTimer();

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks);
                addRecording(audioBlob);
            };
        });

        document.getElementById('stopButton').addEventListener('click', () => {
            mediaRecorder.stop();
            document.getElementById('stopButton').disabled = true;
            document.getElementById('startButton').disabled = false;
            clearInterval(timerInterval);
        });

        function startTimer() {
            recordingTime = 0;
            timerInterval = setInterval(() => {
                recordingTime++;
                const minutes = Math.floor(recordingTime / 60);
                const seconds = recordingTime % 60;
                document.getElementById('timer').textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function addRecording(audioBlob) {
            const url = URL.createObjectURL(audioBlob);
            const li = document.createElement('li');
            li.textContent = `Recording: ${document.getElementById('soundType').value}`;
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = url;
            li.appendChild(audio);
            const deleteButton = document.createElement('button');
            deleteButton.textContent = 'Delete';
            deleteButton.onclick = () => li.remove();
            li.appendChild(deleteButton);
            document.getElementById('recordingsList').appendChild(li);
        }

        document.getElementById('generateTemplate').addEventListener('click', () => {
            const notes = document.getElementById('notes').value;
            const template = `# Story Template\n\n## Sound Type: ${document.getElementById('soundType').value}\n\n## Notes: ${notes}`;
            const blob = new Blob([template], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'story_template.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
