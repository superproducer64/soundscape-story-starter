<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>SoundScape Story Starter</title>\n    <style>\n        body {\n            background: linear-gradient(to right, #1a1a1a, #0d0d0d);\n            color: white;\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            margin: 0;\n        }\n        button {\n            background-color: #4388f1;\n            border: none;\n            color: white;\n            padding: 10px 20px;\n            margin: 5px;\n            cursor: pointer;\n            border-radius: 5px;\n            transition: background-color 0.3s;\n        }\n        button:hover {\n            background-color: #007bff;\n        }\n        #recordings {\n            margin-top: 20px;\n            width: 80%;\n        }\n        .recording {\n            display: flex;\n            justify-content: space-between;\n            padding: 10px;\n            border: 1px solid #ccc;\n            margin: 5px 0;\n            background-color: #2e2e2e;\n        }\n        #template {\n            margin-top: 20px;\n            padding: 10px;\n            border: 1px solid #ccc;\n            width: 80%;\n            background-color: #1e1e1e;\n        }\n    </style>\n</head>\n<body>\n    <h1>SoundScape Story Starter</h1>\n    <div id="recording-panel">\n        <select id="sound-type">\n            <option value="sound1">Sound Type 1</option>\n            <option value="sound2">Sound Type 2</option>\n        </select>\n        <input type="text" id="notes" placeholder="Notes">\n        <button id="start-recording">Start Recording</button>\n        <button id="stop-recording">Stop Recording</button>\n        <div id="timer">00:00</div>\n    </div>\n    <div id="recordings"></div>\n    <div id="template">\n        <h3>Story Template</h3>\n        <button id="generate-template">Generate Story Template</button>\n    </div>\n    <script>\n        let timer;\n        let recordings = [];\n        let isRecording = false;\n        document.getElementById('start-recording').onclick = function() {\n            isRecording = true;\n            startTimer();\n            // Logic to start recording\n        };\n        document.getElementById('stop-recording').onclick = function() {\n            isRecording = false;\n            stopTimer();\n            // Logic to stop recording and save data\n        };\n        function startTimer() {\n            let seconds = 0;\n            timer = setInterval(() => {\n                seconds++;\n                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(11, 8);\n            }, 1000);\n        }\n        function stopTimer() {\n            clearInterval(timer);\n        }\n        document.getElementById('generate-template').onclick = function() {\n            // Logic to generate story template\n            alert('Story template generated!');\n        };\n    <\script>\n</body>\n</html>
